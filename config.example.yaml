# IoT Waste Monitoring & Characterization configuration.
# Copy to config.yaml and edit for your installation.

# ---- Hardware ----
hardware:
  # Set to true to use mock implementations (no Pi required).
  # Useful for developing the dashboard on a laptop.
  use_mock: true

  scale:
    # ADS1115 I2C address (default 0x48 when ADDR pin tied to GND)
    i2c_address: 0x48
    # Calibration factor: volts per gram (V/g). Determined via scripts/calibrate_scale.py
    calibration_factor: 1.0
    # Tare offset in volts (subtracted before dividing by calibration_factor)
    tare_offset: 0.0
    # ADS1115 PGA gain setting (2/3=±6.144V, 1=±4.096V, 2=±2.048V, 4=±1.024V, 8=±0.512V, 16=±0.256V)
    # Use 0.6667 (2/3) when powering ADS1115 at 5V to cover the full 0-5V input range.
    gain: 0.6667
    # Samples per second the loop will try to read
    sample_rate_hz: 10

  camera:
    # OpenCV camera index (0 = first USB camera)
    index: 0
    width: 640
    height: 480
    # JPEG quality for saved images (1-100)
    jpeg_quality: 85

# ---- Event detection (stable placement) ----
events:
  # Minimum weight (grams) to consider something is on the scale
  min_weight_g: 5.0
  # Number of consecutive samples that must be stable
  stability_window: 8
  # Standard deviation (grams) within window must be <= this
  stability_g: 1.0
  # After event recorded, weight must drop below this before next event accepted
  reset_threshold_g: 2.0
  # Bin capacity in kg. When the total weight on the scale reaches this value
  # the system stops accepting new placements until the bin is emptied
  # (weight drops back below reset_threshold_g).
  capacity_kg: 100.0

# ---- AI Detection ----
ai:
  # 'mock'           - development mode, no model needed
  # 'tflite'         - EfficientDet-Lite0 COCO object-detection model (default)
  # 'classification' - image-classification model (Google Teachable Machine TFLite export)
  #                    Name your Teachable Machine classes: plastic / paper / metal / glass / organic
  backend: mock

  # --- tflite (COCO object detection) ---
  model_path: app/ai/models/efficientdet_lite0.tflite
  labels_path: app/ai/models/coco_labels.txt
  input_size: 320       # EfficientDet-Lite0 expects 320×320

  # --- classification (Teachable Machine) --- uncomment and change these:
  # model_path: app/ai/models/waste_classifier.tflite
  # labels_path: app/ai/models/waste_labels.txt
  # input_size: 224     # Teachable Machine exports expect 224×224

  # Minimum confidence (0-1) to accept a detection
  min_confidence: 0.4

# ---- Database ----
database:
  url: sqlite:///data/waste.db

# ---- Web server ----
web:
  host: 0.0.0.0   # 0.0.0.0 = reachable from any device on the local network
  port: 5000       # change to 80 (with authbind) to access without typing a port number
  debug: false
  # Secret used by Flask sessions / Socket.IO
  secret_key: change-me-in-production

# ---- Storage ----
storage:
  images_dir: data/images

# ---- Logging ----
logging:
  level: INFO
